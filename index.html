
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3 Player Bluff Battle</title>
<style>
*{box-sizing:border-box;font-family:Poppins,Arial,sans-serif}
body{
  margin:0;min-height:100vh;
  background:radial-gradient(circle at top,#243b55,#141e30 70%);
  color:white;display:flex;justify-content:center;align-items:center;padding:18px;
}
.app{
  width:100%;max-width:900px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:25px;
  padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.4);
}
h1{text-align:center;margin:5px 0 10px;font-size:32px}
.sub{text-align:center;color:#d8e6ff;margin-bottom:18px}
.card{
  background:rgba(255,255,255,.13);border-radius:20px;padding:18px;margin:14px 0;
  border:1px solid rgba(255,255,255,.12)
}
.row{display:flex;gap:12px;flex-wrap:wrap}
input,button,select{
  border:none;border-radius:14px;padding:13px;font-size:16px
}
input{flex:1;min-width:160px}
button{
  cursor:pointer;font-weight:700;background:#ffd166;color:#211;
  transition:.2s;box-shadow:0 6px 0 #b8860b
}
button:hover{transform:translateY(-2px)}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #b8860b}
button.alt{background:#80ed99;box-shadow:0 6px 0 #248232}
button.danger{background:#ff6b6b;box-shadow:0 6px 0 #9b2226;color:white}
button.blue{background:#7bdff2;box-shadow:0 6px 0 #0077b6}
.hidden{display:none}
.players{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.player{
  text-align:center;background:rgba(0,0,0,.25);border-radius:18px;padding:14px
}
.avatar{font-size:38px}
.score{font-size:24px;color:#ffd166;font-weight:800}
.big{
  text-align:center;font-size:24px;line-height:1.5
}
.roleBox{
  text-align:center;font-size:28px;font-weight:900;padding:22px;border-radius:20px;
  background:linear-gradient(135deg,#ffafcc,#bde0fe);color:#111
}
.choiceGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.choiceGrid button{min-height:80px}
.log{
  max-height:180px;overflow:auto;background:rgba(0,0,0,.35);
  padding:12px;border-radius:15px;font-size:14px;color:#eef
}
.badge{
  display:inline-block;background:#ffd166;color:#111;padding:6px 12px;border-radius:99px;
  margin:4px;font-weight:800
}
.pulse{animation:pulse .7s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.04)}}
@media(max-width:700px){
  .players,.choiceGrid{grid-template-columns:1fr}
  h1{font-size:26px}
}
</style>
</head>
<body>
<div class="app">
  <h1>🎭 3 Player Bluff Battle</h1>
  <div class="sub">Secret roles • Bluffing • Voting • Treasure stealing • Full fun party game</div>

  <div id="setup" class="card">
    <h2>Enter 3 Players</h2>
    <div class="row">
      <input id="p1" placeholder="Player 1 name" value="Player 1">
      <input id="p2" placeholder="Player 2 name" value="Player 2">
      <input id="p3" placeholder="Player 3 name" value="Player 3">
    </div>
    <br>
    <button onclick="startGame()" class="alt">Start Game 🚀</button>
  </div>

  <div id="game" class="hidden">
    <div class="players" id="scoreBoard"></div>

    <div class="card big">
      <div>Round <span id="roundNo">1</span> / 7</div>
      <div id="phaseText">Ready</div>
    </div>

    <div id="passScreen" class="card big">
      <p id="passText"></p>
      <button onclick="showRole()" class="blue">I am alone, show my secret 👀</button>
    </div>

    <div id="roleScreen" class="card hidden">
      <div class="roleBox" id="roleBox"></div>
      <p class="big" id="roleInfo"></p>
      <button onclick="hideRole()" class="danger">Hide and pass phone 🙈</button>
    </div>

    <div id="actionScreen" class="card hidden">
      <h2 id="actionTitle"></h2>
      <div class="choiceGrid" id="actionChoices"></div>
    </div>

    <div id="voteScreen" class="card hidden">
      <h2>🗳️ Vote: Who is the Thief?</h2>
      <p>Discuss, bluff, lie, shout, defend yourself. Then each player votes.</p>
      <div id="voteArea"></div>
    </div>

    <div id="resultScreen" class="card hidden">
      <h2>Round Result ⚡</h2>
      <div id="resultText" class="big"></div>
      <button onclick="nextRound()" class="alt">Next Round ➜</button>
    </div>

    <div id="finalScreen" class="card hidden">
      <h2>🏆 Final Winner</h2>
      <div id="winnerText" class="big pulse"></div>
      <button onclick="location.reload()" class="alt">Play Again 🔁</button>
    </div>

    <div class="card">
      <h3>Game Log</h3>
      <div id="log" class="log"></div>
    </div>
  </div>
</div>

<script>
let players=[], round=1, maxRounds=7;
let currentReveal=0, currentAction=0, currentVote=0;
let roles=[], actions=[], votes=[];
let treasures=["💎 Diamond","👑 Crown","🗝️ Golden Key","🔥 Fire Gem","🪙 Ancient Coin","🐉 Dragon Egg","🌙 Moon Crystal"];

const roleData = {
  "Guardian": {
    emoji:"🛡️",
    info:"Protect treasure. If thief is caught, you get bonus points."
  },
  "Thief": {
    emoji:"🗡️",
    info:"Steal secretly. Convince others you are innocent."
  },
  "Trickster": {
    emoji:"🎭",
    info:"Create confusion. You score if vote goes wrong."
  }
};

function startGame(){
  players=[
    {name:p1.value||"Player 1",score:0,emoji:"🐯"},
    {name:p2.value||"Player 2",score:0,emoji:"🦊"},
    {name:p3.value||"Player 3",score:0,emoji:"🐼"}
  ];
  setup.classList.add("hidden");
  game.classList.remove("hidden");
  newRound();
}

function renderScores(){
  scoreBoard.innerHTML=players.map(p=>`
    <div class="player">
      <div class="avatar">${p.emoji}</div>
      <h3>${p.name}</h3>
      <div class="score">${p.score} pts</div>
    </div>
  `).join("");
}

function logMsg(msg){
  log.innerHTML = "• " + msg + "<br>" + log.innerHTML;
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-.5);
}

function newRound(){
  renderScores();
  roundNo.textContent=round;
  phaseText.textContent="Secret role reveal";
  roles=shuffle(["Guardian","Thief","Trickster"]);
  actions=[];
  votes=[];
  currentReveal=0;
  currentAction=0;
  currentVote=0;
  hideAll();
  passScreen.classList.remove("hidden");
  passText.textContent=`Pass phone to ${players[currentReveal].name}`;
}

function hideAll(){
  [passScreen,roleScreen,actionScreen,voteScreen,resultScreen,finalScreen].forEach(x=>x.classList.add("hidden"));
}

function showRole(){
  hideAll();
  roleScreen.classList.remove("hidden");
  let role=roles[currentReveal];
  roleBox.textContent=`${players[currentReveal].name}: ${roleData[role].emoji} ${role}`;
  roleInfo.textContent=roleData[role].info;
}

function hideRole(){
  currentReveal++;
  hideAll();
  if(currentReveal<3){
    passScreen.classList.remove("hidden");
    passText.textContent=`Pass phone to ${players[currentReveal].name}`;
  }else{
    startActions();
  }
}

function startActions(){
  phaseText.textContent="Secret actions";
  currentAction=0;
  showAction();
}

function showAction(){
  hideAll();
  actionScreen.classList.remove("hidden");
  let p=players[currentAction];
  let role=roles[currentAction];
  actionTitle.textContent=`${p.name}, choose your secret action`;

  let choices=[];
  if(role==="Guardian"){
    choices=[
      ["Protect Treasure 🛡️","protect"],
      ["Spy Someone 👀","spy"],
      ["Fake Suspicion 🎭","fake"]
    ];
  }else if(role==="Thief"){
    choices=[
      ["Steal Treasure 🗡️","steal"],
      ["Frame Someone 😈","frame"],
      ["Act Innocent 😇","innocent"]
    ];
  }else{
    choices=[
      ["Confuse Everyone 🌪️","confuse"],
      ["Swap Clues 🔄","swap"],
      ["Drama Speech 🎤","drama"]
    ];
  }

  actionChoices.innerHTML=choices.map(c=>`
    <button onclick="pickAction('${c[1]}')">${c[0]}</button>
  `).join("");
}

function pickAction(act){
  actions[currentAction]=act;
  logMsg(`${players[currentAction].name} locked a secret action.`);
  currentAction++;
  if(currentAction<3){
    showAction();
  }else{
    startVoting();
  }
}

function startVoting(){
  hideAll();
  phaseText.textContent="Discussion and voting";
  voteScreen.classList.remove("hidden");
  currentVote=0;
  renderVote();
}

function renderVote(){
  voteArea.innerHTML=`
    <div class="card">
      <h3>${players[currentVote].name}, who do you think is the Thief?</h3>
      <div class="row">
        ${players.map((p,i)=>`<button onclick="castVote(${i})">${p.name}</button>`).join("")}
      </div>
    </div>
  `;
}

function castVote(i){
  votes[currentVote]=i;
  logMsg(`${players[currentVote].name} voted.`);
  currentVote++;
  if(currentVote<3) renderVote();
  else calculateResult();
}

function calculateResult(){
  hideAll();
  resultScreen.classList.remove("hidden");

  let thiefIndex=roles.indexOf("Thief");
  let guardianIndex=roles.indexOf("Guardian");
  let tricksterIndex=roles.indexOf("Trickster");

  let count=[0,0,0];
  votes.forEach(v=>count[v]++);
  let accused=count.indexOf(Math.max(...count));

  let treasure=treasures[Math.floor(Math.random()*treasures.length)];
  let text=`<p>Treasure of this round: <span class="badge">${treasure}</span></p>`;
  text+=`<p>Real Thief was <b>${players[thiefIndex].name}</b> 🗡️</p>`;
  text+=`<p>Most voted player: <b>${players[accused].name}</b></p>`;

  if(accused===thiefIndex){
    players[guardianIndex].score+=4;
    players.filter((_,i)=>votes[i]===thiefIndex).forEach(p=>p.score+=2);
    text+=`<p>✅ Thief caught! Guardian gets +4. Correct voters get +2.</p>`;
  }else{
    players[thiefIndex].score+=5;
    players[tricksterIndex].score+=3;
    text+=`<p>❌ Wrong vote! Thief escapes +5. Trickster enjoys chaos +3.</p>`;
  }

  actions.forEach((a,i)=>{
    if(a==="steal") players[i].score+=1;
    if(a==="protect") players[i].score+=1;
    if(a==="confuse") players[i].score+=1;
    if(a==="spy") players[i].score+=1;
    if(a==="frame") players[i].score+=1;
    if(a==="drama") players[i].score+=1;
  });

  text+=`<p>Secret action bonus: selected tactical actions gave +1.</p>`;
  resultText.innerHTML=text;
  renderScores();
}

function nextRound(){
  round++;
  if(round>maxRounds){
    showFinal();
  }else{
    newRound();
  }
}

function showFinal(){
  hideAll();
  finalScreen.classList.remove("hidden");
  phaseText.textContent="Game finished";
  let sorted=[...players].sort((a,b)=>b.score-a.score);
  winnerText.innerHTML=`
    ${sorted[0].emoji} ${sorted[0].name} wins with ${sorted[0].score} points!<br><br>
    🥇 ${sorted[0].name}: ${sorted[0].score}<br>
    🥈 ${sorted[1].name}: ${sorted[1].score}<br>
    🥉 ${sorted[2].name}: ${sorted[2].score}
  `;
}
</script>
</body>
</html>
