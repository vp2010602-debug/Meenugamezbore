<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>3 Player Game Hub</title>
<style>
*{box-sizing:border-box;font-family:Poppins,Arial}
body{
margin:0;min-height:100vh;color:white;padding:15px;
background:radial-gradient(circle at top,#ffafcc 0,#3a0ca3 35%,#111827 80%);
}
.app{max-width:950px;margin:auto}
h1{text-align:center;margin:10px 0;font-size:34px}
.card{
background:rgba(255,255,255,.13);backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.22);border-radius:24px;
padding:18px;margin:14px 0;box-shadow:0 20px 45px #0006
}
input,button,select{
width:100%;padding:14px;border:0;border-radius:15px;margin:7px 0;font-size:16px
}
button{font-weight:900;background:#ffd166;color:#111;cursor:pointer}
.green{background:#80ed99}.pink{background:#ffafcc}.blue{background:#90dbf4}.red{background:#ff6b6b;color:white}
.hidden{display:none}
.room{text-align:center;color:#ffd166;font-size:30px;font-weight:900;letter-spacing:3px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.player{text-align:center;background:#0005;border-radius:18px;padding:13px}
.badge{display:inline-block;background:#ffd166;color:#111;padding:7px 12px;border-radius:99px;margin:4px;font-weight:900}
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.cell{
aspect-ratio:1/1;background:white;color:#111;border-radius:13px;
display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px
}
.marked{background:#80ed99;text-decoration:line-through}
.sudoku{
display:grid;grid-template-columns:repeat(9,1fr);gap:2px;background:#111;padding:4px;border-radius:12px
}
.sudoku input{
margin:0;border-radius:4px;text-align:center;font-size:20px;font-weight:900;
aspect-ratio:1/1;padding:0;background:white;color:#111
}
.sudoku input.fixed{background:#ffd166;color:#111}
.sudoku input.bad{background:#ff6b6b;color:white}
.sudoku input.good{background:#80ed99;color:#111}
.sudoku input:nth-child(3n){border-right:3px solid #111}
.sudoku input:nth-child(n+19):nth-child(-n+27),
.sudoku input:nth-child(n+46):nth-child(-n+54){border-bottom:3px solid #111}
.big{text-align:center;font-size:26px;font-weight:900;color:#80ed99}
@media(max-width:700px){.grid3{grid-template-columns:1fr}h1{font-size:27px}.cell{font-size:18px}}
</style>
</head>
<body>
<div class="app">
<h1>🎮 3 Player Game Hub</h1>

<div id="home" class="card">
<input id="nameInput" placeholder="Your name">
<button class="green" onclick="createRoom()">Create Room</button>
<input id="roomInput" placeholder="Enter Room Code">
<button class="blue" onclick="joinRoom()">Join Room</button>
</div>

<div id="lobby" class="card hidden">
<p>Room Code</p>
<div class="room" id="roomText"></div>
<h3>Players</h3>
<div class="grid3" id="playersBox"></div>
<h3>Choose Game</h3>
<button class="green" onclick="startBingo()">🎯 Start Bingo Battle</button>
<button class="pink" onclick="startSudoku()">🧠 Start Sudoku Race</button>
</div>

<div id="bingo" class="hidden">
<div class="card">
<h2>🎯 Bingo Battle</h2>
<p id="turnText"></p>
<button id="callBtn" onclick="callNumber()">Call Number 🎲</button>
</div>
<div class="card"><h3>Called Numbers</h3><div id="calledBox"></div></div>
<div class="card"><h3>Your Board</h3><div class="board" id="bingoBoard"></div></div>
<div class="card"><h3>Leaderboard</h3><div class="grid3" id="bingoScores"></div></div>
</div>

<div id="sudoku" class="hidden">
<div class="card">
<h2>🧠 Sudoku Race</h2>
<p>Solve fast. Wrong entries reduce your score.</p>
<div class="big" id="timerBox">00:00</div>
</div>
<div class="card"><div class="sudoku" id="sudokuGrid"></div></div>
<div class="card"><h3>Leaderboard</h3><div class="grid3" id="sudokuScores"></div></div>
</div>

<div id="winnerBox" class="card hidden">
<div class="big" id="winnerText"></div>
<button class="green" onclick="location.reload()">Play Again</button>
</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getDatabase,ref,set,update,onValue,get}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuNbEcsm_aiXIUXxsVq6vkMDBZNPexH88",
  authDomain: "bingovicky-ebad1.firebaseapp.com",
  databaseURL: "https://bingovicky-ebad1-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bingovicky-ebad1",
  storageBucket: "bingovicky-ebad1.firebasestorage.app",
  messagingSenderId: "69770922572",
  appId: "1:69770922572:web:23509243d16bae088942e9",
  measurementId: "G-KTB33J64VQ"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let room="",pid="",pname="",data=null,timerInt=null,startTime=0;

const puzzle=[
5,3,0,0,7,0,0,0,0,
6,0,0,1,9,5,0,0,0,
0,9,8,0,0,0,0,6,0,
8,0,0,0,6,0,0,0,3,
4,0,0,8,0,3,0,0,1,
7,0,0,0,2,0,0,0,6,
0,6,0,0,0,0,2,8,0,
0,0,0,4,1,9,0,0,5,
0,0,0,0,8,0,0,7,9
];

const solution=[
5,3,4,6,7,8,9,1,2,
6,7,2,1,9,5,3,4,8,
1,9,8,3,4,2,5,6,7,
8,5,9,7,6,1,4,2,3,
4,2,6,8,5,3,7,9,1,
7,1,3,9,2,4,8,5,6,
9,6,1,5,3,7,2,8,4,
2,8,7,4,1,9,6,3,5,
3,4,5,2,8,6,1,7,9
];

function board(){
let a=[];for(let i=1;i<=25;i++)a.push(i);
return a.sort(()=>Math.random()-.5);
}

window.createRoom=async()=>{
pname=nameInput.value.trim();
if(!pname)return alert("Enter name macha");
room=Math.random().toString(36).substring(2,8).toUpperCase();
pid="p"+Date.now();
await set(ref(db,"gameHub/"+room),{
host:pid,status:"lobby",game:"",turn:0,called:[],winner:"",
startTime:0,
players:{[pid]:{name:pname,bingo:board(),sudoku:[...puzzle],mistakes:0,finished:false,time:0}}
});
enter();
};

window.joinRoom=async()=>{
pname=nameInput.value.trim();
room=roomInput.value.trim().toUpperCase();
if(!pname||!room)return alert("Enter name and room code");
let snap=await get(ref(db,"gameHub/"+room));
if(!snap.exists())return alert("Room not found");
let d=snap.val();
if(Object.keys(d.players||{}).length>=3)return alert("Room full");
pid="p"+Date.now();
await update(ref(db,"gameHub/"+room+"/players/"+pid),{
name:pname,bingo:board(),sudoku:[...puzzle],mistakes:0,finished:false,time:0
});
enter();
};

function enter(){
home.classList.add("hidden");
lobby.classList.remove("hidden");
roomText.innerText=room;
onValue(ref(db,"gameHub/"+room),snap=>{
data=snap.val();if(!data)return;
renderPlayers();
if(data.game==="bingo")showBingo();
if(data.game==="sudoku")showSudoku();
if(data.winner)showWinner(data.winner);
});
}

function renderPlayers(){
playersBox.innerHTML=Object.values(data.players||{}).map(p=>`
<div class="player">👤<br><b>${p.name}</b></div>`).join("");
}

window.startBingo=async()=>{
if(data.host!==pid)return alert("Only host can start");
if(Object.keys(data.players).length!==3)return alert("Need 3 players");
await update(ref(db,"gameHub/"+room),{game:"bingo",status:"playing",turn:0,called:[],winner:""});
};

window.startSudoku=async()=>{
if(data.host!==pid)return alert("Only host can start");
if(Object.keys(data.players).length!==3)return alert("Need 3 players");
await update(ref(db,"gameHub/"+room),{game:"sudoku",status:"playing",winner:"",startTime:Date.now()});
};

function hideAll(){
lobby.classList.add("hidden");bingo.classList.add("hidden");sudoku.classList.add("hidden");
}

function showBingo(){
hideAll();bingo.classList.remove("hidden");
let ids=Object.keys(data.players);
let current=ids[data.turn%ids.length];
turnText.innerHTML="Turn: <b>"+data.players[current].name+"</b>";
callBtn.disabled=current!==pid||data.winner;
renderBingoBoard();renderCalled();renderBingoScores();
}

window.callNumber=async()=>{
let called=data.called||[];
let available=[];
for(let i=1;i<=25;i++)if(!called.includes(i))available.push(i);
let num=available[Math.floor(Math.random()*available.length)];
called.push(num);
let ids=Object.keys(data.players);
await update(ref(db,"gameHub/"+room),{called,turn:(data.turn+1)%ids.length});
};

function renderBingoBoard(){
let me=data.players[pid];
let called=data.called||[];
bingoBoard.innerHTML=me.bingo.map(n=>`
<div class="cell ${called.includes(n)?"marked":""}">${n}</div>`).join("");
let lines=countLines(me.bingo,called);
if(lines>=5&&!data.winner)update(ref(db,"gameHub/"+room),{winner:me.name+" won Bingo 🎯"});
}

function renderCalled(){
calledBox.innerHTML=(data.called||[]).map(n=>`<span class="badge">${n}</span>`).join("");
}

function countLines(b,called){
let g=[];for(let i=0;i<5;i++)g.push(b.slice(i*5,i*5+5));
let l=0;
for(let r=0;r<5;r++)if(g[r].every(n=>called.includes(n)))l++;
for(let c=0;c<5;c++)if([0,1,2,3,4].every(r=>called.includes(g[r][c])))l++;
if([0,1,2,3,4].every(i=>called.includes(g[i][i])))l++;
if([0,1,2,3,4].every(i=>called.includes(g[i][4-i])))l++;
return l;
}

function renderBingoScores(){
bingoScores.innerHTML=Object.values(data.players).map(p=>{
let l=countLines(p.bingo,data.called||[]);
return `<div class="player"><b>${p.name}</b><br>${l}/5 lines</div>`;
}).join("");
}

function showSudoku(){
hideAll();sudoku.classList.remove("hidden");
renderSudoku();
renderSudokuScores();
startTimer();
}

function renderSudoku(){
let me=data.players[pid];
sudokuGrid.innerHTML=me.sudoku.map((v,i)=>{
let fixed=puzzle[i]!==0;
return `<input maxlength="1" value="${v||""}" ${fixed?"disabled":""}
class="${fixed?"fixed":""}" oninput="sudokuInput(${i},this.value,this)">`;
}).join("");
}

window.sudokuInput=async(i,val,el)=>{
val=parseInt(val)||0;
let me=data.players[pid];
let arr=[...me.sudoku];
arr[i]=val;
let mistakes=me.mistakes||0;
if(val&&val!==solution[i]){mistakes++;el.className="bad"}
else if(val===solution[i])el.className="good";
await update(ref(db,"gameHub/"+room+"/players/"+pid),{sudoku:arr,mistakes});
checkSudokuWin(arr,mistakes);
};

function checkSudokuWin(arr,mistakes){
let done=arr.every((v,i)=>v===solution[i]);
if(done&&!data.winner){
let seconds=Math.floor((Date.now()-data.startTime)/1000);
update(ref(db,"gameHub/"+room+"/players/"+pid),{finished:true,time:seconds});
update(ref(db,"gameHub/"+room),{winner:pname+" won Sudoku 🧠 in "+seconds+" sec"});
}
}

function renderSudokuScores(){
sudokuScores.innerHTML=Object.values(data.players).map(p=>{
let filled=p.sudoku.filter(x=>x!==0).length;
return `<div class="player">
<b>${p.name}</b><br>
Filled: ${filled}/81<br>
Mistakes: ${p.mistakes||0}<br>
${p.finished?"✅ Finished":"⏳ Playing"}
</div>`;
}).join("");
}

function startTimer(){
clearInterval(timerInt);
timerInt=setInterval(()=>{
if(!data||!data.startTime)return;
let s=Math.floor((Date.now()-data.startTime)/1000);
let m=String(Math.floor(s/60)).padStart(2,"0");
let sec=String(s%60).padStart(2,"0");
timerBox.innerText=m+":"+sec;
},1000);
}

function showWinner(w){
winnerBox.classList.remove("hidden");
winnerText.innerHTML="🏆 "+w;
if(callBtn)callBtn.disabled=true;
}
</script>
</body>
</html>
